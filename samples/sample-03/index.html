<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Performance Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #faf5ff;
      --surface: #ffffff;
      --border: #e9d8fd;
      --accent: #7c3aed;
      --accent2: #f59e0b;
      --accent3: #ec4899;
      --text: #1a1025;
      --muted: #7c6f9a;
      --card-radius: 14px;
      --shadow: 0 3px 20px rgba(124,58,237,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--border);
    }
    header h1 { font-size: 1.6rem; font-weight: 800; }
    header h1 span { color: var(--accent); }
    .meta { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 26px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
    }
    .card:nth-child(2) { border-left-color: var(--accent2); }
    .card:nth-child(3) { border-left-color: var(--accent3); }
    .card:nth-child(4) { border-left-color: #10b981; }
    .card-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
    .card-value { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; }
    .card-icon { font-size: 1.4rem; margin-bottom: 6px; }
    .card-sub { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .chart-title { font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: var(--text); }
    canvas { max-height: 310px; }
    @media (max-width: 600px) {
      body { padding: 14px; }
      .cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📱 Content <span>Performance</span></h1>
    <div class="meta">Last updated: <span id="lastUpdated"></span></div>
  </div>
</header>

<div class="cards">
  <div class="card">
    <div class="card-icon">👁️</div>
    <div class="card-label">Total Views This Month</div>
    <div class="card-value" id="totalViews">—</div>
    <div class="card-sub" id="viewsSub"></div>
  </div>
  <div class="card">
    <div class="card-icon">💬</div>
    <div class="card-label">Avg Engagement Rate</div>
    <div class="card-value" id="avgEngagement">—</div>
    <div class="card-sub">% over last 30 days</div>
  </div>
  <div class="card">
    <div class="card-icon">🥇</div>
    <div class="card-label">Top Performing Day</div>
    <div class="card-value" id="topDay">—</div>
    <div class="card-sub" id="topDaySub"></div>
  </div>
  <div class="card">
    <div class="card-icon">📈</div>
    <div class="card-label">New Followers</div>
    <div class="card-value" id="newFollowers">—</div>
    <div class="card-sub">gained this period</div>
  </div>
</div>

<div class="chart-section">
  <div class="chart-title">Daily Views &amp; Engagement Rate — Last 30 Days</div>
  <canvas id="contentChart"></canvas>
</div>

<script>
// SWAP THIS: replace with your real API call or data source
// Expected shape: array of { date: "YYYY-MM-DD", views: number, engagement_rate: number, shares: number, new_followers: number }
const CONTENT_DATA = [
  { date: "2026-05-28", views: 1240, engagement_rate: 3.2, shares: 48, new_followers: 12 },
  { date: "2026-05-29", views: 980,  engagement_rate: 2.9, shares: 31, new_followers: 8  },
  { date: "2026-05-30", views: 1560, engagement_rate: 4.1, shares: 72, new_followers: 19 },
  { date: "2026-05-31", views: 870,  engagement_rate: 2.5, shares: 24, new_followers: 6  },
  { date: "2026-06-01", views: 2100, engagement_rate: 5.3, shares: 110, new_followers: 34 },
  { date: "2026-06-02", views: 1890, engagement_rate: 4.8, shares: 88,  new_followers: 28 },
  { date: "2026-06-03", views: 1320, engagement_rate: 3.6, shares: 55,  new_followers: 15 },
  { date: "2026-06-04", views: 1100, engagement_rate: 3.1, shares: 40,  new_followers: 10 },
  { date: "2026-06-05", views: 1740, engagement_rate: 4.4, shares: 78,  new_followers: 22 },
  { date: "2026-06-06", views: 2340, engagement_rate: 5.8, shares: 140, new_followers: 41 },
  { date: "2026-06-07", views: 2050, engagement_rate: 5.1, shares: 125, new_followers: 37 },
  { date: "2026-06-08", views: 1650, engagement_rate: 4.2, shares: 68,  new_followers: 18 },
  { date: "2026-06-09", views: 1200, engagement_rate: 3.3, shares: 47,  new_followers: 13 },
  { date: "2026-06-10", views: 1480, engagement_rate: 3.9, shares: 60,  new_followers: 17 },
  { date: "2026-06-11", views: 3100, engagement_rate: 7.2, shares: 215, new_followers: 67 },
  { date: "2026-06-12", views: 2780, engagement_rate: 6.5, shares: 188, new_followers: 55 },
  { date: "2026-06-13", views: 2100, engagement_rate: 5.0, shares: 130, new_followers: 38 },
  { date: "2026-06-14", views: 1540, engagement_rate: 4.0, shares: 62,  new_followers: 16 },
  { date: "2026-06-15", views: 1380, engagement_rate: 3.7, shares: 52,  new_followers: 14 },
  { date: "2026-06-16", views: 1260, engagement_rate: 3.3, shares: 44,  new_followers: 11 },
  { date: "2026-06-17", views: 1620, engagement_rate: 4.3, shares: 74,  new_followers: 21 },
  { date: "2026-06-18", views: 1890, engagement_rate: 4.7, shares: 95,  new_followers: 29 },
  { date: "2026-06-19", views: 2200, engagement_rate: 5.5, shares: 152, new_followers: 45 },
  { date: "2026-06-20", views: 1970, engagement_rate: 5.0, shares: 120, new_followers: 36 },
  { date: "2026-06-21", views: 1500, engagement_rate: 3.9, shares: 61,  new_followers: 17 },
  { date: "2026-06-22", views: 1280, engagement_rate: 3.4, shares: 49,  new_followers: 12 },
  { date: "2026-06-23", views: 1750, engagement_rate: 4.6, shares: 83,  new_followers: 24 },
  { date: "2026-06-24", views: 2050, engagement_rate: 5.2, shares: 135, new_followers: 40 },
  { date: "2026-06-25", views: 1820, engagement_rate: 4.8, shares: 98,  new_followers: 30 },
  { date: "2026-06-26", views: 2300, engagement_rate: 5.9, shares: 168, new_followers: 51 }
];

function fmt(n) {
  return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
}

function render() {
  document.getElementById('lastUpdated').textContent = new Date().toLocaleString();

  const thisMonth = new Date().toISOString().slice(0, 7);
  const monthData = CONTENT_DATA.filter(d => d.date.startsWith(thisMonth));

  const totalViews = monthData.reduce((s, d) => s + d.views, 0);
  document.getElementById('totalViews').textContent = fmt(totalViews);
  document.getElementById('viewsSub').textContent = monthData.length + ' days tracked';

  const avgEng = (CONTENT_DATA.reduce((s, d) => s + d.engagement_rate, 0) / CONTENT_DATA.length).toFixed(1);
  document.getElementById('avgEngagement').textContent = avgEng + '%';

  const top = CONTENT_DATA.reduce((best, d) => d.views > best.views ? d : best, CONTENT_DATA[0]);
  document.getElementById('topDay').textContent = top.date.slice(5).replace('-', '/');
  document.getElementById('topDaySub').textContent = fmt(top.views) + ' views on this day';

  const totalFollowers = CONTENT_DATA.reduce((s, d) => s + d.new_followers, 0);
  document.getElementById('newFollowers').textContent = totalFollowers;

  // Chart — dual axis
  const labels = CONTENT_DATA.map(d => d.date.slice(5).replace('-', '/'));
  new Chart(document.getElementById('contentChart'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Daily Views',
          data: CONTENT_DATA.map(d => d.views),
          backgroundColor: 'rgba(124,58,237,0.25)',
          borderColor: 'rgba(124,58,237,0.8)',
          borderWidth: 1,
          yAxisID: 'yViews',
          borderRadius: 4,
        },
        {
          type: 'line',
          label: 'Engagement Rate %',
          data: CONTENT_DATA.map(d => d.engagement_rate),
          borderColor: '#f59e0b',
          backgroundColor: 'transparent',
          tension: 0.45,
          pointRadius: 3,
          pointHoverRadius: 6,
          yAxisID: 'yEng',
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#1a1025', font: { size: 12 } } },
        tooltip: { backgroundColor: '#fff', titleColor: '#1a1025', bodyColor: '#7c6f9a', borderColor: '#e9d8fd', borderWidth: 1 }
      },
      scales: {
        x: { ticks: { color: '#7c6f9a', maxTicksLimit: 10 }, grid: { color: '#f3e8ff' } },
        yViews: {
          position: 'left',
          ticks: { color: '#7c3aed' },
          grid: { color: '#f3e8ff' },
          title: { display: true, text: 'Views', color: '#7c3aed', font: { size: 11 } }
        },
        yEng: {
          position: 'right',
          ticks: { color: '#f59e0b', callback: v => v + '%' },
          grid: { display: false },
          title: { display: true, text: 'Engagement %', color: '#f59e0b', font: { size: 11 } }
        }
      }
    }
  });
}

render();
</script>
</body>
</html>
